<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyses | Console SEREINA - Pilotage Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--space-8);
        }

        .chart-box {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--space-10);
            border: 1px solid var(--neutral-200);
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            padding: 40px 20px 20px;
            position: relative;
        }

        .bar {
            flex: 1;
            background: var(--primary-700);
            border-radius: 4px 4px 0 0;
            position: relative;
        }

        .bar::after {
            content: attr(data-label);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            color: var(--neutral-500);
        }
    </style>
</head>
<body style="background: var(--neutral-50);">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="px-8 mb-16">
                <a href="index.html" class="logo" style="color: white;">SEREINA</a>
            </div>
            <nav class="flex-1">
                <a href="admin.html" class="admin-nav-item">Vue d'ensemble</a>
                <a href="#" class="admin-nav-item">Commandes</a>
                <a href="inventory.html" class="admin-nav-item">Produits & Stock</a>
                <a href="customers.html" class="admin-nav-item">Clients</a>
                <a href="reports.html" class="admin-nav-item active">Rapports</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="flex justify-between items-center mb-12">
                <h1>Rapports d'Activité</h1>
                <div class="flex gap-4">
                    <select class="select" style="width: auto; padding: 8px 16px; font-size: 12px; font-weight: bold;">
                        <option>30 derniers jours</option>
                        <option>Ce trimestre</option>
                        <option>Année 2026</option>
                    </select>
                </div>
            </header>

            <div class="report-grid fade-in">
                <div class="chart-box">
                    <h3 class="text-xs uppercase font-bold mb-8">Évolution du CA (k€)</h3>
                    <div class="chart-container">
                        <div class="bar" style="height: 40%;" data-label="Jan"></div>
                        <div class="bar" style="height: 60%;" data-label="Fev"></div>
                        <div class="bar" style="height: 50%;" data-label="Mar"></div>
                        <div class="bar" style="height: 80%;" data-label="Avr"></div>
                        <div class="bar" style="height: 95%;" data-label="Mai"></div>
                        <div class="bar" style="height: 70%;" data-label="Jun"></div>
                    </div>
                </div>

                <div class="flex flex-col gap-8">
                    <div class="card">
                        <h4 class="text-xs uppercase font-bold mb-4">Panier Moyen</h4>
                        <p class="font-heading m-0" style="font-size: 36px; font-weight: bold; color: var(--primary-900);">158,00 €</p>
                        <p class="stat-delta delta-up">+5.2% vs Mai</p>
                    </div>
                    <div class="card">
                        <h4 class="text-xs uppercase font-bold mb-4">Taux de Rétention</h4>
                        <p class="font-heading m-0" style="font-size: 36px; font-weight: bold; color: var(--primary-900);">24.8 %</p>
                        <p class="stat-delta delta-up">+1.4% vs 2025</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
