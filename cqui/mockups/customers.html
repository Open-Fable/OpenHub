<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Clients | Console SEREINA - CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .tier-badge {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .tier-gold { background: #fef9e7; color: #9a7d0a; border: 1px solid #fcf3cf; }
        .tier-silver { background: #f1f0ec; color: var(--neutral-600); border: 1px solid var(--neutral-200); }

        .customer-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary-100);
            color: var(--primary-700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body style="background: var(--neutral-50);">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="px-8 mb-16">
                <a href="index.html" class="logo" style="color: white;">SEREINA</a>
            </div>
            <nav class="flex-1">
                <a href="admin.html" class="admin-nav-item">Vue d'ensemble</a>
                <a href="#" class="admin-nav-item">Commandes</a>
                <a href="inventory.html" class="admin-nav-item">Produits & Stock</a>
                <a href="customers.html" class="admin-nav-item active">Clients</a>
                <a href="reports.html" class="admin-nav-item">Rapports</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="flex justify-between items-center mb-12">
                <h1>Fichier Clients</h1>
                <button class="btn btn-primary" style="padding: 10px 24px;">Exporter CRM</button>
            </header>

            <div class="admin-card fade-in">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Email</th>
                                <th>Statut</th>
                                <th>Commandes</th>
                                <th>Total CA</th>
                                <th class="text-right">Dernière Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="flex items-center gap-4">
                                        <div class="customer-avatar">CM</div>
                                        <span class="font-bold">Claire Moreau</span>
                                    </div>
                                </td>
                                <td class="text-sm">claire.m@example.com</td>
                                <td><span class="tier-badge tier-gold">Membre Gold</span></td>
                                <td class="font-bold">4</td>
                                <td class="font-bold">512,00 €</td>
                                <td class="text-right text-xs">Aujourd'hui, 11:24</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="flex items-center gap-4">
                                        <div class="customer-avatar">ML</div>
                                        <span class="font-bold">Marc Lefebvre</span>
                                    </div>
                                </td>
                                <td class="text-sm">marc.l@example.com</td>
                                <td><span class="tier-badge tier-silver">Membre Silver</span></td>
                                <td class="font-bold">2</td>
                                <td class="font-bold">278,00 €</td>
                                <td class="text-right text-xs">Hier, 15:42</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
