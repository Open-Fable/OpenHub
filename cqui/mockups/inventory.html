<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire | Console SEREINA - Gestion Stocks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .stock-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-ok { background: var(--success); }
        .dot-low { background: var(--warning); }
        .dot-out { background: var(--error); }

        .product-thumb {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid var(--neutral-200);
        }
    </style>
</head>
<body style="background: var(--neutral-50);">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="px-8 mb-16">
                <a href="index.html" class="logo" style="color: white;">SEREINA</a>
            </div>
            <nav class="flex-1">
                <a href="admin.html" class="admin-nav-item">Vue d'ensemble</a>
                <a href="#" class="admin-nav-item">Commandes</a>
                <a href="inventory.html" class="admin-nav-item active">Produits & Stock</a>
                <a href="customers.html" class="admin-nav-item">Clients</a>
                <a href="reports.html" class="admin-nav-item">Rapports</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="flex justify-between items-center mb-12">
                <h1>Gestion de l'Inventaire</h1>
                <div class="flex gap-4">
                    <button class="btn btn-primary" style="padding: 10px 24px;">+ Ajouter un produit</button>
                </div>
            </header>

            <div class="admin-card fade-in">
                <div class="flex justify-between mb-8">
                    <input type="text" class="input" placeholder="Filtrer par nom ou SKU..." style="width: 300px; font-size: 13px;">
                    <select class="select" style="width: 200px; font-size: 13px;">
                        <option>Toutes les catégories</option>
                        <option>Ville Femme</option>
                        <option>Ville Homme</option>
                        <option>Accessoires</option>
                    </select>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Aperçu</th>
                                <th>Nom / SKU</th>
                                <th>Catégorie</th>
                                <th>Stock</th>
                                <th>Prix</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><img src="https://images.unsplash.com/photo-1560769629-975ec94e6a86?auto=format&fit=crop&q=80&w=100" class="product-thumb"></td>
                                <td>
                                    <p class="font-bold m-0">L'Urbaine Sereine (38)</p>
                                    <span class="text-2xs text-muted font-mono">SR-URB-WH-38</span>
                                </td>
                                <td>Ville Femme</td>
                                <td><div class="stock-indicator"><span class="dot dot-ok"></span> 42 en stock</div></td>
                                <td class="font-bold">145 €</td>
                                <td class="text-right">
                                    <button class="btn-ghost text-xs underline">Éditer</button>
                                </td>
                            </tr>
                            <tr>
                                <td><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=100" class="product-thumb"></td>
                                <td>
                                    <p class="font-bold m-0">Horizon Active (40)</p>
                                    <span class="text-2xs text-muted font-mono">SR-HOR-RD-40</span>
                                </td>
                                <td>Performance</td>
                                <td><div class="stock-indicator"><span class="dot dot-low"></span> 2 restants</div></td>
                                <td class="font-bold">120 €</td>
                                <td class="text-right">
                                    <button class="btn-ghost text-xs underline">Réappro.</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
