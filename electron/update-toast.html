<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-app-region: no-drag;
        user-select: none;
      }
      .toast {
        margin: 8px;
        padding: 12px 14px;
        background: #1a1a1a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.04);
      }
      .toast-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(20, 184, 166, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 16px;
      }
      .toast-body {
        flex: 1;
        min-width: 0;
      }
      .toast-title {
        color: #e0e0e0;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }
      .toast-desc {
        color: #777;
        font-size: 11px;
        line-height: 1.3;
        margin-top: 1px;
      }
      .btn-install {
        background: #14b8a6;
        color: #0a0a0a;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-install:hover {
        background: #2dd4bf;
      }
      .btn-install:active {
        background: #0d9488;
      }
      .btn-close {
        background: none;
        border: none;
        color: #555;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 4px;
        line-height: 1;
        flex-shrink: 0;
        transition: color 0.15s;
        border-radius: 4px;
      }
      .btn-close:hover {
        color: #aaa;
        background: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <div class="toast">
      <div class="toast-icon">⬆</div>
      <div class="toast-body">
        <div class="toast-title">Mise à jour disponible</div>
        <div class="toast-desc" id="toast-version"></div>
      </div>
      <button class="btn-install" id="btn-install">Installer</button>
      <button class="btn-close" id="btn-close">✕</button>
    </div>
    <script>
      var lang = window.openaxis && window.openaxis.language === "en" ? "en" : "fr";
      var STR = {
        fr: {
          available: "Mise à jour disponible",
          install: "Installer",
          downloading: "Téléchargement…",
        },
        en: {
          available: "Update available",
          install: "Install",
          downloading: "Downloading…",
        },
      }[lang];

      var titleEl = document.querySelector(".toast-title");
      if (titleEl) titleEl.textContent = STR.available;
      var installBtn = document.getElementById("btn-install");
      if (installBtn) installBtn.textContent = STR.install;

      var params = new URLSearchParams(window.location.search);
      var ver = params.get("version") || "?";
      document.getElementById("toast-version").textContent = "OpenAxis v" + ver;

      document.getElementById("btn-close").addEventListener("click", function () {
        if (window.openaxis && window.openaxis.dismissUpdateToast) {
          window.openaxis.dismissUpdateToast();
        }
      });

      if (window.openaxis && window.openaxis.onSelfUpdateStatus) {
        window.openaxis.onSelfUpdateStatus(function (s) {
          if (!s || !s.stage) return;
          if (s.stage === "downloading") {
            installBtn.disabled = true;
            installBtn.textContent = s.percent + "%";
            installBtn.style.opacity = "0.8";
            if (titleEl) titleEl.textContent = STR.downloading;
          } else if (s.stage === "ready") {
            installBtn.disabled = true;
            installBtn.textContent = "✓";
            installBtn.style.opacity = "0.8";
            if (titleEl) titleEl.textContent = lang === "en" ? "Ready" : "Prêt";
          } else if (s.stage === "error") {
            installBtn.disabled = false;
            installBtn.textContent = STR.install;
            installBtn.style.opacity = "1";
            if (titleEl) titleEl.textContent = lang === "en" ? "Error" : "Erreur";
          }
        });
      }

      installBtn.addEventListener("click", function () {
        if (installBtn.disabled) return;
        installBtn.disabled = true;
        installBtn.textContent = "…";
        installBtn.style.opacity = "0.6";
        if (titleEl) titleEl.textContent = STR.downloading;
        if (window.openaxis && window.openaxis.selfUpdateInstall) {
          window.openaxis.selfUpdateInstall();
        }
      });
    </script>
  </body>
</html>
