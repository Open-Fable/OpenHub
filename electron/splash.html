<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A0A;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 28px;
    }

    .logo {
      width: 72px;
      height: 72px;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .wordmark {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #ECECEC;
    }

    .loader {
      width: 32px;
      height: 32px;
    }

    .loader svg {
      width: 100%;
      height: 100%;
      animation: spin 1.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 512 512" fill="none">
        <g stroke="#14B8A6" stroke-width="76" stroke-linecap="round">
          <path d="M 311.4 103.8 A 162 162 0 0 1 415.5 284.1"/>
          <path d="M 360.1 380.1 A 162 162 0 0 1 151.9 380.1"/>
          <path d="M 96.5 284.1 A 162 162 0 0 1 200.6 103.8"/>
        </g>
      </svg>
    </div>
    <span class="wordmark">OpenHub</span>
    <div class="loader">
      <svg viewBox="0 0 512 512" fill="none">
        <g stroke="#14B8A6" stroke-width="76" stroke-linecap="round" opacity="0.25">
          <path d="M 311.4 103.8 A 162 162 0 0 1 415.5 284.1"/>
          <path d="M 360.1 380.1 A 162 162 0 0 1 151.9 380.1"/>
          <path d="M 96.5 284.1 A 162 162 0 0 1 200.6 103.8"/>
        </g>
        <g stroke="#14B8A6" stroke-width="76" stroke-linecap="round">
          <path d="M 311.4 103.8 A 162 162 0 0 1 415.5 284.1"/>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
