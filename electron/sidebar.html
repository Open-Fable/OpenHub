<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>OpenHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --sidebar-bg: #161616;
      --border: #2a2a2a;
      --text-muted: #6e6e6e;
      --text: #d4d4d4;
      --accent: #7c6af2;
      --active-bg: #252525;
      --hover-bg: #202020;
      --radius: 10px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--sidebar-bg);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* Traffic light drag region */
    .drag-region {
      -webkit-app-region: drag;
      height: 52px;
      width: 100%;
      flex-shrink: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      width: 72px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .slots {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 8px 0;
      flex: 1;
    }

    .slot-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 52px;
      height: 56px;
      border: none;
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      transition: background 120ms ease, color 120ms ease;
      position: relative;
    }

    .slot-btn:hover {
      background: var(--hover-bg);
      color: var(--text);
    }

    .slot-btn.active {
      background: var(--active-bg);
      color: var(--accent);
    }

    .slot-btn.active::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .slot-icon {
      font-size: 20px;
      line-height: 1;
    }

    .slot-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--border);
      margin: 8px auto;
    }

    .bottom-slots {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
    }

    /* Loading indicator dot */
    .slot-btn .dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0;
      transition: opacity 200ms;
    }

    .slot-btn.loading .dot {
      opacity: 1;
      background: #f0b429;
      animation: pulse 1s ease-in-out infinite;
    }

    .slot-btn.ready .dot {
      opacity: 1;
      background: #4caf50;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Config top-sheet ── */
    #config-panel {
      position: fixed;
      left: 72px;
      top: 0; right: 0;
      z-index: 100;
      pointer-events: none;
    }

    #config-panel.open { pointer-events: all; }

    /* semi-transparent backdrop, only below the sheet */
    #config-backdrop {
      position: fixed;
      left: 72px;
      top: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    #config-panel.open ~ #config-backdrop {
      opacity: 1;
      pointer-events: all;
    }

    .config-card {
      background: #1e1e1e;
      border-bottom: 1px solid var(--border);
      border-left: none;
      border-right: none;
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 20px 32px 24px;
      transform: translateY(-100%);
      transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    #config-panel.open .config-card {
      transform: translateY(0);
    }

    .config-card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      white-space: nowrap;
    }

    .config-sections {
      display: flex;
      gap: 32px;
      flex: 1;
    }

    .config-section { flex: 1; min-width: 160px; }

    .config-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .config-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      gap: 12px;
    }

    .config-row label {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
    }

    .config-row input[type="password"],
    .config-row input[type="text"] {
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      width: 160px;
      outline: none;
    }

    .config-row input:focus { border-color: var(--accent); }

    .config-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 24px;
    }

    .btn-save {
      padding: 8px 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .btn-close:hover { color: var(--text); }

    /* ── Welcome screen ── */
    #welcome {
      position: fixed;
      left: 72px;
      top: 0; right: 0; bottom: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      z-index: 10;
    }

    #welcome.hidden { display: none; }

    .welcome-title { text-align: center; }

    .welcome-title h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .welcome-title p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .welcome-cards {
      display: flex;
      gap: 20px;
    }

    .welcome-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 190px;
      padding: 32px 20px;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
      -webkit-app-region: no-drag;
    }

    .welcome-card:hover {
      background: #252525;
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .welcome-card:active { transform: translateY(0); }

    .welcome-card-icon { font-size: 34px; line-height: 1; }

    .welcome-card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .welcome-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="drag-region"></div>

  <div class="slots">
    <button class="slot-btn" data-slot="work" title="Work">
      <div class="dot"></div>
      <span class="slot-icon">◈</span>
      <span class="slot-label">Work</span>
    </button>

    <button class="slot-btn" data-slot="code" title="Code">
      <div class="dot"></div>
      <span class="slot-icon">&lt;/&gt;</span>
      <span class="slot-label">Code</span>
    </button>

    <button class="slot-btn" data-slot="design" title="Design">
      <div class="dot"></div>
      <span class="slot-icon">✦</span>
      <span class="slot-label">Design</span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="bottom-slots">
    <button class="slot-btn" data-slot="config" title="Configuration">
      <span class="slot-icon">⚙</span>
      <span class="slot-label">Config</span>
    </button>
  </div>
</div>

<!-- Welcome screen -->
<div id="welcome">
  <div class="welcome-title">
    <h1>OpenHub</h1>
    <p>Choisissez un outil pour commencer</p>
  </div>
  <div class="welcome-cards">
    <div class="welcome-card" data-slot="work">
      <span class="welcome-card-icon">◈</span>
      <span class="welcome-card-name">Work</span>
      <span class="welcome-card-desc">Gestion de projets et de tâches avec l'IA</span>
    </div>
    <div class="welcome-card" data-slot="code">
      <span class="welcome-card-icon">&lt;/&gt;</span>
      <span class="welcome-card-name">Code</span>
      <span class="welcome-card-desc">Assistant de développement et de code</span>
    </div>
    <div class="welcome-card" data-slot="design">
      <span class="welcome-card-icon">✦</span>
      <span class="welcome-card-name">Design</span>
      <span class="welcome-card-desc">Création et édition de designs avec l'IA</span>
    </div>
  </div>
</div>

<!-- Config top-sheet (slides down from top of content area) -->
<div id="config-panel">
  <div class="config-card">
    <div>
      <h2>⚙ Configuration</h2>
    </div>
    <div class="config-sections">
      <div class="config-section">
        <h3>Clés API</h3>
        <div class="config-row">
          <label>Anthropic</label>
          <input type="password" id="key-anthropic" placeholder="sk-ant-..." />
        </div>
        <div class="config-row">
          <label>OpenAI</label>
          <input type="password" id="key-openai" placeholder="sk-..." />
        </div>
        <div class="config-row">
          <label>Ollama URL</label>
          <input type="text" id="key-ollama" placeholder="http://localhost:11434" />
        </div>
      </div>
      <div class="config-section">
        <h3>OAuth</h3>
        <div class="config-row">
          <label>GitHub Token</label>
          <input type="password" id="key-github" placeholder="ghp_..." />
        </div>
        <h3 style="margin-top:12px">Web Search</h3>
        <div class="config-row">
          <label>Brave Search</label>
          <input type="password" id="key-brave" placeholder="BSA..." />
        </div>
      </div>
    </div>
    <div class="config-actions">
      <button class="btn-close" id="close-config">✕</button>
      <button class="btn-save" id="save-config">Enregistrer</button>
    </div>
  </div>
</div>
<!-- Backdrop — click outside to close -->
<div id="config-backdrop"></div>

<script>
  const buttons = document.querySelectorAll('.slot-btn[data-slot]');
  const configPanel = document.getElementById('config-panel');
  const welcome = document.getElementById('welcome');

  // Welcome screen — click a card to launch that slot
  document.querySelectorAll('.welcome-card[data-slot]').forEach(card => {
    card.addEventListener('click', async () => {
      const slot = card.dataset.slot;
      welcome.classList.add('hidden');
      setLoading(slot, true);
      try {
        await window.openhub.switchSlot(slot);
      } catch (err) {
        console.error('[sidebar] welcome switchSlot failed:', err);
        setLoading(slot, false);
      }
    });
  });

  function setLoading(slot, isLoading) {
    const btn = document.querySelector(`[data-slot="${slot}"]`);
    if (btn) btn.classList.toggle('loading', isLoading);
  }

  // Slot switching with loading feedback
  buttons.forEach(btn => {
    btn.addEventListener('click', async () => {
      const slot = btn.dataset.slot;
      if (!slot || slot === 'config') return;
      setLoading(slot, true);
      try {
        await window.openhub.switchSlot(slot);
      } catch (err) {
        console.error('[sidebar] switchSlot failed:', err);
        setLoading(slot, false);
      }
    });
  });

  // Active state synced from main process
  window.openhub.onSlotChanged(slot => {
    buttons.forEach(b => {
      b.classList.toggle('active', b.dataset.slot === slot);
      b.classList.remove('loading');
    });
  });

  const backdrop = document.getElementById('config-backdrop');

  function openConfig() { configPanel.classList.add('open'); }
  function closeConfig() { configPanel.classList.remove('open'); }

  window.openhub.onShowConfig(openConfig);
  document.getElementById('close-config').addEventListener('click', closeConfig);
  backdrop.addEventListener('click', closeConfig);

  document.getElementById('save-config').addEventListener('click', async () => {
    await window.openhub.saveApiKeys({
      anthropic: document.getElementById('key-anthropic').value,
      openai: document.getElementById('key-openai').value,
      ollamaUrl: document.getElementById('key-ollama').value,
      githubToken: document.getElementById('key-github').value,
      braveSearchKey: document.getElementById('key-brave').value,
    });
    configPanel.classList.remove('open');
  });

  // Config button
  document.querySelector('[data-slot="config"]').addEventListener('click', () => {
    if (openhub) openhub.switchSlot('config');
  });
</script>

</body>
</html>
