name: Bug Report
description: Signaler un bug ou un comportement inattendu
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il ?
      placeholder: Décris le problème de manière concise.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Etapes pour reproduire
      description: Comment reproduire le bug ?
      placeholder: |
        1. Lancer OpenHub
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer ?
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: Version macOS
      placeholder: "ex: macOS 15.2 Sequoia"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Version Node.js
      placeholder: "ex: 22.12.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / captures d'ecran
      description: Colle ici les logs de la console Electron ou des captures d'ecran.
      render: shell

  - type: dropdown
    id: app
    attributes:
      label: App concernee
      options:
        - OpenHub (shell)
        - OpenWork
        - OpenCode
        - Open Design
        - Proxy LLM
        - Chat integre
        - Autre
    validations:
      required: true
